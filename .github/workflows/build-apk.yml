name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          # 清除npm缓存，避免校验和错误
          npm cache clean --force
          # 先尝试正常安装，失败则删除lockfile重新安装
          npm install --legacy-peer-deps || (rm -f package-lock.json && npm install --legacy-peer-deps)
          # 修复部分插件目录结构不完整（缺少 android/src/main）导致 cap sync 失败的问题
          for plugin in node_modules/@capacitor/*; do
            if [ -d "$plugin" ] && [ ! -d "$plugin/android/src/main" ]; then
              mkdir -p "$plugin/android/src/main"
            fi
          done

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Setup signing keystore
        working-directory: android/app
        run: |
          # 签名一致性策略（按优先级）：
          # 1. GitHub Secrets 中的 KEYSTORE_BASE64（最稳，推荐）
          # 2. 缓存中恢复（保证 7 天内多次构建签名一致）
          # 3. 首次运行时生成新 keystore 并缓存（后续构建将复用）
          
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "✅ Using keystore from GitHub Secrets (签名最稳定)"
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore
          elif [ -f /tmp/stockthelper-keystore/release.keystore ]; then
            echo "✅ Using cached keystore (签名与上次构建一致)"
            cp /tmp/stockthelper-keystore/release.keystore release.keystore
          else
            echo "⚙️ First run: generating new keystore and caching..."
            keytool -genkeypair \
              -keystore release.keystore \
              -alias stockthelper \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass "stockthelper2024" \
              -keypass "stockthelper2024" \
              -dname "CN=StockTHelper, OU=App, O=Personal, L=Beijing, ST=Beijing, C=CN"
            
            # 保存到 /tmp 临时位置，供 cache step 缓存
            mkdir -p /tmp/stockthelper-keystore
            cp release.keystore /tmp/stockthelper-keystore/release.keystore
            echo "Keystore generated and saved for caching"
          fi
          
          # 显示签名信息
          echo ""
          echo "===== Keystore Info ====="
          keytool -list -v -keystore release.keystore -storepass stockthelper2024 2>/dev/null | \
            grep -E "(Alias name|Owner|SHA1|SHA256)" | head -10
          echo "========================="
          
          # 保存 keystore SHA1 指纹到文件，方便对比
          keytool -list -v -keystore release.keystore -storepass stockthelper2024 2>/dev/null | \
            grep -E "SHA1:" | head -1 > keystore-fingerprint.txt
          echo "Fingerprint: $(cat keystore-fingerprint.txt)"
          
          # 输出 keystore 的 base64 编码（方便复制到 GitHub Secrets）
          echo ""
          echo "===== KEYSTORE_BASE64 (复制下面这一行到 GitHub Secret) ====="
          base64 -w 0 release.keystore
          echo ""
          echo "============================================================"
          echo "💡 操作步骤："
          echo "   1. 完整复制上面那行 base64 字符串"
          echo "   2. 进入 GitHub 仓库 → Settings → Secrets and variables → Actions"
          echo "   3. New repository secret"
          echo "   4. Name: KEYSTORE_BASE64"
          echo "   5. Value: 粘贴刚才复制的字符串"
          echo "   6. 点击 Add secret"
          echo "   7. 重新触发构建，以后所有版本签名一致"

      - name: Cache signing keystore
        uses: actions/cache@v4
        with:
          path: /tmp/stockthelper-keystore
          key: stockthelper-keystore-v1
          # 7 天内复用，跨分支也能用最近的 keystore
          restore-keys: |
            stockthelper-keystore-

      - name: Upload keystore as artifact
        working-directory: android/app
        run: |
          # 每次构建都把当前 keystore 上传为 artifact
          # 用户可下载保存，并配置到 GitHub Secrets 中以获得永久稳定的签名
          mkdir -p keystore-artifact
          cp release.keystore keystore-artifact/stockthelper-release.keystore
          echo "Keystore SHA1: $(cat keystore-fingerprint.txt 2>/dev/null || echo 'N/A')" >> keystore-artifact/README.txt
          echo "" >> keystore-artifact/README.txt
          echo "⚠️ 重要：下载此 keystore 并妥善保存！" >> keystore-artifact/README.txt
          echo "然后到 GitHub 仓库 Settings → Secrets 添加：" >> keystore-artifact/README.txt
          echo "  Name: KEYSTORE_BASE64" >> keystore-artifact/README.txt
          echo "  Value: 运行 'base64 -w 0 stockthelper-release.keystore' 获得" >> keystore-artifact/README.txt
        continue-on-error: true

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          # 优先构建 release 签名版，失败则回退到 debug 版
          if ./gradlew assembleRelease --stacktrace; then
            echo "Release APK built successfully"
            echo "APK_TYPE=release" >> $GITHUB_ENV
          else
            echo "Release build failed, falling back to debug..."
            ./gradlew assembleDebug --stacktrace
            echo "Debug APK built successfully"
            echo "APK_TYPE=debug" >> $GITHUB_ENV
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: stock-t-helper-apk
          path: android/app/build/outputs/apk/${{ env.APK_TYPE }}/*.apk
