name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          # 清除npm缓存，避免校验和错误
          npm cache clean --force
          # 先尝试正常安装，失败则删除lockfile重新安装
          npm install --legacy-peer-deps || (rm -f package-lock.json && npm install --legacy-peer-deps)

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Setup signing keystore
        working-directory: android/app
        run: |
          # 方案1: 如果设置了 KEYSTORE_BASE64 secret，解码使用（推荐，签名完全一致）
          # 方案2: 否则每次生成新密钥库（签名可能略有差异，但密码一致）
          
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "Using keystore from GitHub Secrets..."
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore
          else
            echo "Generating new keystore with fixed credentials..."
            # 使用固定参数，每次生成的密钥库内容应该一致
            keytool -genkey -v \
              -keystore release.keystore \
              -alias stockthelper \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass "stockthelper2024" \
              -keypass "stockthelper2024" \
              -dname "CN=StockTHelper, OU=App, O=Personal, L=Beijing, ST=Beijing, C=CN"
          fi
          
          echo "Keystore ready: $(ls -la release.keystore)"

      - name: Build Signed APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: stock-t-helper-apk
          path: android/app/build/outputs/apk/release/*.apk
