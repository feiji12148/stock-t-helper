name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          # 清除npm缓存，避免校验和错误
          npm cache clean --force
          # 先尝试正常安装，失败则删除lockfile重新安装
          npm install --legacy-peer-deps || (rm -f package-lock.json && npm install --legacy-peer-deps)
          # 修复部分插件目录结构不完整（缺少 android/src/main）导致 cap sync 失败的问题
          for plugin in node_modules/@capacitor/*; do
            if [ -d "$plugin" ] && [ ! -d "$plugin/android/src/main" ]; then
              mkdir -p "$plugin/android/src/main"
            fi
          done

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Setup signing keystore
        working-directory: android/app
        run: |
          # 签名一致性策略（按优先级）：
          # 1. GitHub Secrets 中的 KEYSTORE_BASE64（最稳定，推荐）
          # 2. 仓库中的 release.keystore（次稳定，提交到仓库里）
          # 3. 生成新 keystore 并提交回仓库（首次运行）
          
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "✅ Using keystore from GitHub Secrets"
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore
          elif [ -f release.keystore ]; then
            echo "✅ Using keystore from repository (签名固定)"
          else
            echo "⚙️ First run: generating new keystore..."
            keytool -genkeypair \
              -keystore release.keystore \
              -alias stockthelper \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass "stockthelper2024" \
              -keypass "stockthelper2024" \
              -dname "CN=StockTHelper, OU=App, O=Personal, L=Beijing, ST=Beijing, C=CN"
            echo "✅ Keystore generated"
          fi
          
          # 显示签名信息
          echo ""
          echo "===== Keystore Info ====="
          keytool -list -v -keystore release.keystore -storepass stockthelper2024 2>/dev/null | \
            grep -E "(Alias name|Owner|SHA1|SHA256)" | head -10
          echo "========================="

      - name: Build Release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: stock-t-helper-apk
          path: android/app/build/outputs/apk/release/*.apk

      - name: Upload keystore as artifact
        working-directory: android/app
        run: |
          mkdir -p keystore-artifact
          cp release.keystore keystore-artifact/stockthelper-release.keystore
          echo "⚠️ 重要：下载此 keystore 并妥善保存！" > keystore-artifact/README.txt
          echo "首次安装新版需卸载旧版，之后即可直接覆盖更新。" >> keystore-artifact/README.txt
        continue-on-error: true

      - name: Upload keystore artifact
        uses: actions/upload-artifact@v4
        with:
          name: signing-keystore
          path: android/app/keystore-artifact/
        continue-on-error: true

      - name: Commit keystore to repo (first time only)
        working-directory: android/app
        run: |
          # 检查 keystore 是否已存在于仓库中
          if git ls-files --error-unmatch release.keystore 2>/dev/null; then
            echo "Keystore already tracked in repo, skipping commit."
          else
            echo "Committing keystore to repo for permanent signing consistency..."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add release.keystore
            git commit -m "chore: add signing keystore for consistent APK signatures" || echo "Nothing to commit"
            git push
          fi
